name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -r requirements.txt
      # the session fixture compiles the 4-gate pipeline from scratch in CI
      # (out/ is gitignored); deterministic, ~5 minutes
      - run: python -m pytest -v
